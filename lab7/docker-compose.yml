services:
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    environment:
      AUTH_SECRET: ${AUTH_SECRET:-dev_auth_secret_change_me_32_chars}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      BACKEND_API_URL: ${BACKEND_API_URL:-http://backend:8080}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
    networks:
      - shared

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      HOST: postgres
      PORT: 5432
      USERNAME: ${POSTGRES_USER:-sport}
      PASSWORD: ${POSTGRES_PASSWORD:-sport_password}
      DB_NAME: ${POSTGRES_DB:-sport_platform}
      SALT_SIZE: ${SALT_SIZE:-16}
      ITERATIONS: ${ITERATIONS:-1}
      MEMORY: ${MEMORY:-65536}
      THREADS: ${THREADS:-4}
      KEY_LENGTH: ${KEY_LENGTH:-32}
      ACCESS_SECRET: ${ACCESS_SECRET:-dev_access_secret_change_me}
      REFRESH_SECRET: ${REFRESH_SECRET:-dev_refresh_secret_change_me}
      ISSUER: ${ISSUER:-sport-platform}
      EXPIRE_TIMEOUT_ACCESS: ${EXPIRE_TIMEOUT_ACCESS:-24h}
      EXPIRE_TIMEOUT_REFRESH: ${EXPIRE_TIMEOUT_REFRESH:-168h}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_USE_SSL: "false"
      MINIO_BUCKET_NAME: clubs
      APP_PORT: 8080
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      DEMO_SEED: ${DEMO_SEED:-true}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - shared

  postgres:
    image: postgres:17.5-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sport}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sport_password}
      POSTGRES_DB: ${POSTGRES_DB:-sport_platform}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - shared

  minio:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - shared

volumes:
  pg_data:
  minio_data:

networks:
  shared:
    driver: bridge
