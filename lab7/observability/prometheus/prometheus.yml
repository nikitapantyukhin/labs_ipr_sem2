global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: sport-platform-backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:8080

  - job_name: sport-platform-frontend
    metrics_path: /api/metrics
    static_configs:
      - targets:
          - frontend:3000
