apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: sport-platform
data:
  datasources.yml: |
    apiVersion: 1

    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-service:9090
        isDefault: true
      - name: Tempo
        uid: tempo
        type: tempo
        access: proxy
        url: http://tempo-service:3200
  dashboards.yml: |
    apiVersion: 1

    providers:
      - name: Lab7
        orgId: 1
        folder: Lab7
        type: file
        disableDeletion: false
        updateIntervalSeconds: 15
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-lab7-dashboard
  namespace: sport-platform
data:
  sport-platform-backend.json: |
    {
      "uid": "sport-platform-backend-observability",
      "title": "Sport Platform Backend Observability",
      "schemaVersion": 40,
      "version": 1,
      "refresh": "10s",
      "time": {
        "from": "now-30m",
        "to": "now"
      },
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Backend RPS by route",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (route) (rate(sport_platform_backend_http_requests_total[1m]))",
              "legendFormat": "{{route}}"
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Backend latency p95",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "targets": [
            {
              "refId": "A",
              "expr": "histogram_quantile(0.95, sum by (le, route) (rate(sport_platform_backend_http_request_duration_seconds_bucket[5m])))",
              "legendFormat": "p95 {{route}}"
            }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Business events, last 15 minutes",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 8
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (event) (increase(sport_platform_backend_business_events_total[15m]))",
              "legendFormat": "{{event}}"
            }
          ]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: sport-platform
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.4.0
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            - name: GF_USERS_DEFAULT_THEME
              value: light
          ports:
            - containerPort: 3000
              name: http
          volumeMounts:
            - name: provisioning
              mountPath: /etc/grafana/provisioning/datasources/datasources.yml
              subPath: datasources.yml
            - name: provisioning
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yml
              subPath: dashboards.yml
            - name: dashboard
              mountPath: /var/lib/grafana/dashboards
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: provisioning
          configMap:
            name: grafana-provisioning
        - name: dashboard
          configMap:
            name: grafana-lab7-dashboard
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
  namespace: sport-platform
  labels:
    app: grafana
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30091
