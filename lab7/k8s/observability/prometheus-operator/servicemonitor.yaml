apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: sport-platform-backend
  namespace: sport-platform
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: backend
  namespaceSelector:
    matchNames:
      - sport-platform
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 5s
      honorLabels: true
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: sport-platform-frontend
  namespace: sport-platform
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: frontend
  namespaceSelector:
    matchNames:
      - sport-platform
  endpoints:
    - port: http
      path: /api/metrics
      interval: 15s
      scrapeTimeout: 5s
      honorLabels: true
