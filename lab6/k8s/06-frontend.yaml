apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: sport-platform
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: sport-platform-frontend:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: sport-platform-secret
                  key: AUTH_SECRET
            - name: AUTH_URL
              valueFrom:
                configMapKeyRef:
                  name: sport-platform-config
                  key: AUTH_URL
            - name: NEXTAUTH_URL
              valueFrom:
                configMapKeyRef:
                  name: sport-platform-config
                  key: NEXTAUTH_URL
            - name: BACKEND_API_URL
              valueFrom:
                configMapKeyRef:
                  name: sport-platform-config
                  key: BACKEND_API_URL
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: sport-platform-config
                  key: NEXT_PUBLIC_API_URL
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: sport-platform
  labels:
    app: frontend
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 3000
      nodePort: 30080
