apiVersion: v1
kind: ConfigMap
metadata:
  name: sport-platform-config
data:
  HOST: postgres-0.postgres.sport-platform-infra.svc.cluster.local
  DB_NAME: sport_platform
  DEMO_SEED: "true"
  CORS_ALLOWED_ORIGINS: http://sport.localhost,http://localhost:30080,http://localhost:3000,http://127.0.0.1:3000
  AUTH_URL: http://sport.localhost
  NEXTAUTH_URL: http://sport.localhost
  BACKEND_API_URL: http://backend-service:8080
  NEXT_PUBLIC_API_URL: http://api.sport.localhost
