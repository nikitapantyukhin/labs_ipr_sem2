apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    {{- include "sport-platform.frontendLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        {{- include "sport-platform.frontendLabels" . | nindent 8 }}
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: sport-platform-secret
                  key: AUTH_SECRET
            - name: AUTH_URL
              valueFrom:
                configMapKeyRef:
                  name: sport-platform-config
                  key: AUTH_URL
            - name: NEXTAUTH_URL
              valueFrom:
                configMapKeyRef:
                  name: sport-platform-config
                  key: NEXTAUTH_URL
            - name: BACKEND_API_URL
              valueFrom:
                configMapKeyRef:
                  name: sport-platform-config
                  key: BACKEND_API_URL
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: sport-platform-config
                  key: NEXT_PUBLIC_API_URL
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  labels:
    {{- include "sport-platform.frontendLabels" . | nindent 4 }}
spec:
  type: {{ .Values.frontend.service.type }}
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 3000
      {{- if .Values.frontend.service.nodePort }}
      nodePort: {{ .Values.frontend.service.nodePort }}
      {{- end }}
