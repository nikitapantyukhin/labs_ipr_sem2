apiVersion: v1
kind: ConfigMap
metadata:
  name: sport-platform-config
  labels:
    {{- include "sport-platform.labels" . | nindent 4 }}
data:
  APP_PORT: "8080"
  HOST: {{ .Values.database.host | quote }}
  PORT: {{ .Values.database.port | quote }}
  DB_NAME: {{ .Values.database.name | quote }}
  MINIO_ENDPOINT: {{ .Values.minio.endpoint | quote }}
  MINIO_USE_SSL: {{ .Values.minio.useSsl | quote }}
  MINIO_BUCKET_NAME: {{ .Values.minio.bucketName | quote }}
  ISSUER: {{ .Values.auth.issuer | quote }}
  EXPIRE_TIMEOUT_ACCESS: {{ .Values.auth.accessTtl | quote }}
  EXPIRE_TIMEOUT_REFRESH: {{ .Values.auth.refreshTtl | quote }}
  SALT_SIZE: {{ .Values.security.saltSize | quote }}
  ITERATIONS: {{ .Values.security.iterations | quote }}
  MEMORY: {{ .Values.security.memory | quote }}
  THREADS: {{ .Values.security.threads | quote }}
  KEY_LENGTH: {{ .Values.security.keyLength | quote }}
  DEMO_SEED: {{ .Values.app.demoSeed | quote }}
  CORS_ALLOWED_ORIGINS: {{ .Values.app.corsAllowedOrigins | quote }}
  AUTH_URL: {{ .Values.app.authUrl | quote }}
  NEXTAUTH_URL: {{ .Values.app.nextAuthUrl | quote }}
  BACKEND_API_URL: {{ .Values.app.backendApiUrl | quote }}
  NEXT_PUBLIC_API_URL: {{ .Values.app.nextPublicApiUrl | quote }}
