apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    {{- include "sport-platform.backendLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        {{- include "sport-platform.backendLabels" . | nindent 8 }}
    spec:
      initContainers:
        - name: wait-for-postgres
          image: {{ .Values.backend.waitForPostgresImage | quote }}
          command:
            - sh
            - -c
            - until pg_isready -h "$HOST" -p "$PORT" -U "$USERNAME" -d "$DB_NAME"; do sleep 2; done
          envFrom:
            - configMapRef:
                name: sport-platform-config
            - secretRef:
                name: sport-platform-secret
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: sport-platform-config
            - secretRef:
                name: sport-platform-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  labels:
    {{- include "sport-platform.backendLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
